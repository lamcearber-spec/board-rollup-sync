<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pricing | Board Rollup Sync</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #172033;
        --muted: #5f6f8a;
        --line: #d9e0ec;
        --paper: #ffffff;
        --wash: #f5f7fb;
        --blue: #186ade;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--wash);
        color: var(--ink);
        font-family: Inter, "Segoe UI", Arial, sans-serif;
        line-height: 1.6;
      }

      main {
        width: min(780px, calc(100% - 32px));
        margin: 40px auto;
        padding: 32px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--paper);
      }

      h1 {
        margin: 0 0 12px;
        font-size: 32px;
        line-height: 1.2;
      }

      p {
        color: var(--muted);
      }

      a {
        color: var(--blue);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Pricing</h1>
      <p>
        Board Rollup Sync is free during the initial monday.com marketplace launch. Paid plans may be introduced later
        through monday.com's approved marketplace billing options.
      </p>
      <p>Questions? Contact <a href="mailto:support@konverter-pro.de">support@konverter-pro.de</a>.</p>
    </main>
  </body>
</html>
